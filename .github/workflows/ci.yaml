name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Install pytest
        run: |
          pip install pytest

      - name: Run tests
        run: |
          pytest

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master
